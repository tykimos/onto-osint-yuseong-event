name: Daily OSINT Report

on:
  schedule:
    # config/osint-config.json의 project.schedule_cron과 동기화 (현재 0 22 * * * = KST 07:00)
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Target date (YYYY-MM-DD). Defaults to today (KST) if empty.'
        required: false
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Cheliped Browser
        run: |
          git clone https://github.com/tykimos/cheliped-browser.git /tmp/cheliped-browser
          cd /tmp/cheliped-browser/scripts
          npm install
          npm run build 2>/dev/null || true
          echo "CHELIPED_CLI=/tmp/cheliped-browser/scripts/cheliped-cli.mjs" >> $GITHUB_ENV

      - name: Verify Cheliped and Chrome
        run: |
          which google-chrome || which chromium-browser || echo "No Chrome found"
          node $CHELIPED_CLI '[{"cmd":"goto","args":["https://www.google.com"]},{"cmd":"close"}]' && echo "Cheliped: OK" || echo "Cheliped: FAILED"

      - name: Determine target date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            TARGET="${{ github.event.inputs.target_date }}"
          else
            # cron이 UTC 22:00(=KST 07:00)에 실행되므로 KST 기준 날짜 사용
            TARGET=$(TZ=Asia/Seoul date +%Y-%m-%d)
          fi
          echo "target=$TARGET" >> $GITHUB_OUTPUT
          echo "year=$(echo $TARGET | cut -d- -f1)" >> $GITHUB_OUTPUT
          echo "month=$(echo $TARGET | cut -d- -f2)" >> $GITHUB_OUTPUT

      - name: Shop Watch — deterministic prune (50-day strict cap)
        id: shop_prune
        run: |
          if [ ! -f config/osint-config.json ]; then
            echo "config not found, skip"
            exit 0
          fi
          ENABLED=$(python3 -c "import json,sys; print(json.load(open('config/osint-config.json')).get('shop_watch', {}).get('enabled', False))")
          if [ "$ENABLED" != "True" ]; then
            echo "shop_watch disabled, skip"
            exit 0
          fi
          # 결정적 50일 strict cap 적용 — LLM 변동성 차단
          python3 scripts/shop_roster_prune.py "${{ steps.date.outputs.target }}"
          # 백업 파일은 다음 step의 commit에서 제외 (.gitignore가 처리하지만 안전망)
          rm -f ontology/shop-roster.json.bak

      - name: Generate report with Claude Code
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-opus-4-6 --allowedTools 'Bash(*)' 'Read(*)' 'Write(*)' 'Edit(*)' 'Glob(*)' 'Grep(*)' 'WebSearch(*)' 'WebFetch(*)'"
          use_bedrock: false
          use_vertex: false
          prompt: |
            You are the Onto-OSINT daily report agent.
            **Target date:** ${{ steps.date.outputs.target }}
            **Cheliped CLI:** Available at $CHELIPED_CLI

            Read CLAUDE.md for project rules.
            Read config/osint-config.json for all domain-specific configuration.

            Execute the 6-phase pipeline. For each phase, read the agent file for your role and the referenced skill file for detailed rules.

            ## Phase 0: Prepare
            ```bash
            mkdir -p sources/${{ steps.date.outputs.target }}/items
            mkdir -p reports/${{ steps.date.outputs.year }}/${{ steps.date.outputs.month }}
            mkdir -p ontology/kg
            ```
            Read `config/osint-config.json` for project settings.
            Find previous N days (from config `project.lookback_days`) of `sources/*/index.json` and `reports/**/*.md` using Glob.
            If `ontology/schema.json` has empty `classes` array, initialize it from config's `ontology.seed_classes` and `ontology.seed_relations`.

            ## Phase 1: Collect
            Read `.claude/agents/osint-collector.md` for your role.
            Read `.claude/skills/onto-osint-report/references/search-strategy.md` for search strategy, methods, and output schema.
            Also read `ontology/instances.json` for entity-based keyword expansion.
            Save results to `sources/${{ steps.date.outputs.target }}/search-results.json`.

            ## Phase 1.5: Shop Scout (parallel hook — only if config.shop_watch.enabled == true)
            **Note:** Deterministic 50-day prune already ran in the previous step (shop_prune) before this Claude action. Do NOT run shop_roster_prune.py again.
            Check `config/osint-config.json`'s `shop_watch.enabled`. If true:
              1. Read `.claude/agents/shop-scout.md` for your role.
              2. Read `.claude/skills/shop-watch/references/shop-discovery.md` for discovery channels and opened_date heuristics.
              3. Read `ontology/shop-roster.json` (already pruned) — process `manual_seeds` (pending status) as priority, then re-verify `active_shops` whose `last_verified` is 7+ days old.
              4. Use `cheliped-browser` ($CHELIPED_CLI) for Naver Place / Kakao Map / Instagram first-post-date / Naver Blog first-review-date verification.
              5. **Strict 50-day cap**: any shop whose estimated `opened_date` is more than 50 days before ${{ steps.date.outputs.target }} must be classified as `active_but_old` (not registered as active).
              6. Save results to `sources/${{ steps.date.outputs.target }}/shop-candidates.json`.

            ## Phase 2: Extract
            Read `.claude/agents/osint-extractor.md` for your role.
            Read `.claude/skills/onto-osint-report/references/extraction-rules.md` for extraction rules, tag definitions, dedup rules, and output schemas.
            Save `sources/${{ steps.date.outputs.target }}/index.json`, `sources/${{ steps.date.outputs.target }}/items/src-XXX.json`, and `sources/${{ steps.date.outputs.target }}/entities.json`.

            ## Phase 3-4: Ontology & Knowledge Graph
            Read `.claude/agents/osint-reasoner.md` for your role.
            Read `.claude/skills/onto-osint-report/references/ontology-reasoning.md` for ontology expansion principles, reasoning rules, and KG schemas.
            Update `ontology/schema.json`, `ontology/instances.json`.
            Save `ontology/kg/${{ steps.date.outputs.target }}.json`.
            Update `ontology/kg/cumulative.json`.
            Append to `ontology/reasoning-log.md`.
            Save `sources/${{ steps.date.outputs.target }}/analysis.md` and `sources/${{ steps.date.outputs.target }}/report-basis.md`.

            ## Phase 3.5: Shop Curator (serial hook — only if config.shop_watch.enabled == true)
            If `config.shop_watch.enabled == true`:
              1. Read `.claude/agents/shop-curator.md` for your role.
              2. Read `.claude/skills/shop-watch/references/shop-roster-mgmt.md` for roster schema and dedupe rules.
              3. Read `sources/${{ steps.date.outputs.target }}/shop-candidates.json`, `ontology/shop-roster.json`, and `ontology/instances.json`.
              4. **Strict 50-day cap enforcement**: only register candidates whose `opened_date` is within 50 days of ${{ steps.date.outputs.target }}. Older candidates → `resolved_not_new` in manual_seeds; never add to `active_shops`.
              5. Update `ontology/shop-roster.json` (auto-backup `.bak`).
              6. Sync `ontology/instances.json` Shop instances with `window_status`, `window_expires_on`.
              7. Save `sources/${{ steps.date.outputs.target }}/shop-roster-diff.json`.

            ## Phase 5: Report
            Read `.claude/agents/osint-reporter.md` for your role.
            Read `.claude/skills/onto-osint-report/references/report-format.md` for report structure, KG visualization rules, and Wiki publishing rules.
            **Shop section requirement (if shop_watch enabled)**: read `ontology/shop-roster.json` `active_shops` and include EVERY active shop in the "신규 오픈 가게·팝업·프로모션" section as a table row. If 0 active shops, write the empty message. Also include "사용자 제보 처리 현황" subsection with `manual_seeds` status table (pending/resolved/resolved_not_new/excluded/gave_up).
            Save `reports/${{ steps.date.outputs.year }}/${{ steps.date.outputs.month }}/${{ steps.date.outputs.target }}.md`.
            Include Mermaid knowledge graph visualization in the report.

            ## Phase 5.5: Shop Coverage Auditor (serial hook — only if config.shop_watch.enabled == true)
            If `config.shop_watch.enabled == true`:
              1. Read `.claude/agents/shop-coverage-auditor.md` for your role.
              2. Read `.claude/skills/shop-watch/references/shop-coverage-rules.md` for verification rules.
              3. Verify the generated report contains every `active_shops` entry. If `config.shop_watch.audit_mode == "patch"`, patch missing entries into the "신규 오픈 가게·팝업·프로모션" section.
              4. Verify 3-category coverage (event/shop/public_institution).
              5. Save `sources/${{ steps.date.outputs.target }}/coverage-audit.json` and append "검증 로그" section to the report if patches were applied.

            ## Phase 6: Commit
            ```bash
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add sources/ reports/ ontology/
            git commit -m "report: daily OSINT update (${{ steps.date.outputs.target }})" || echo "nothing to commit"
            git push || echo "push deferred to post-step"
            ```

            **Do not** publish to Wiki and **do not** generate TTL — those are handled by deterministic post-steps after this job step. Just produce the JSON/Markdown artifacts.

      - name: Shop Watch — post-step sanity check
        if: always()
        continue-on-error: true
        env:
          TARGET_DATE: ${{ steps.date.outputs.target }}
        run: |
          # 백업 파일 우선 제거 (commit에서 제외)
          rm -f ontology/shop-roster.json.bak
          if [ ! -f ontology/shop-roster.json ]; then
            echo "::warning::shop-roster.json missing"
            exit 0
          fi
          python3 scripts/shop_watch_sanity.py "$TARGET_DATE" "sources/$TARGET_DATE/coverage-audit.json" || true

      - name: Generate TTL from KG (with prune + validity filter)
        run: |
          # config의 lookback_days를 prune 기준으로 사용 (없으면 14)
          LOOKBACK=$(python3 -c "import json; print(json.load(open('config/osint-config.json')).get('project', {}).get('lookback_days', 14))" 2>/dev/null || echo 14)
          python3 scripts/kg_to_ttl.py "${{ steps.date.outputs.target }}" --prune-days "$LOOKBACK"

      - name: Commit TTL artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # claude-code-action 단계에서 commit 후 unstaged 잔여 변경이 남는 경우가 있어 명시적으로 stage
          git add -A ontology/
          if git diff --cached --quiet; then
            echo "No TTL/ontology changes to commit"
          else
            git commit -m "ontology: TTL snapshot (${{ steps.date.outputs.target }})"
            # claude-code-action이 remote 자격증명을 변경할 수 있어 명시적 토큰 URL 사용
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" HEAD:master
          fi

      - name: Publish to GitHub Wiki
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          bash scripts/publish_wiki.sh "${{ steps.date.outputs.target }}"
